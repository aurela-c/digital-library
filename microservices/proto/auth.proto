syntax = "proto3";

package auth;

service AuthService {
  rpc Register (RegisterRequest) returns (AuthResponse);
  rpc Login (LoginRequest) returns (AuthResponse);
}

message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  string role = 4;
  string profileImage = 5;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message AuthResponse {
  string userId = 1;
  string token = 2;
}
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:4000"]

  - job_name: "auth-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:5001"]

  - job_name: "user-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["user-service:5002"]

  - job_name: "book-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["book-service:5003"]

  - job_name: "borrow-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["borrow-service:5004"]

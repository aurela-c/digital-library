version: "3.8"

networks:
  app_net:
    driver: bridge

services:

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "5001:5001"
      - "5010:5010"
    environment:
      AUTH_GRPC_PORT: "5010"
    networks:
      - app_net

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    ports:
      - "5002:5002"
      - "5012:5012"
    environment:
      USER_GRPC_PORT: "5012"
    networks:
      - app_net

  book-service:
    build:
      context: .
      dockerfile: book-service/Dockerfile
    ports:
      - "5003:5003"
      - "5013:5013"
    environment:
      BOOK_GRPC_PORT: "5013"
    networks:
      - app_net

  borrow-service:
    build:
      context: .
      dockerfile: borrow-service/Dockerfile
    ports:
      - "5004:5004"
      - "5014:5014"
    environment:
      BORROW_GRPC_PORT: "5014"
    networks:
      - app_net

  gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "4000:4000"
    environment:
      AUTH_SERVICE_GRPC: auth-service:5010
      USER_SERVICE_GRPC: user-service:5012
      BOOK_SERVICE_GRPC: book-service:5013
      BORROW_SERVICE_GRPC: borrow-service:5014
    networks:
      - app_net

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - app_net
    depends_on:
      - gateway
      - auth-service
      - user-service
      - book-service
      - borrow-service

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    networks:
      - app_net
    depends_on:
      - prometheus

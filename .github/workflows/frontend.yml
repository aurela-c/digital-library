name: Frontend CI / Netlify

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Require VITE_GATEWAY_TARGET on main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GATEWAY: ${{ secrets.VITE_GATEWAY_TARGET }}
        run: |
          if [ -z "$GATEWAY" ]; then
            echo "::error::Set repository secret VITE_GATEWAY_TARGET to your public Railway api-gateway URL."
            exit 1
          fi

      - name: Production build
        env:
          VITE_GATEWAY_TARGET: ${{ secrets.VITE_GATEWAY_TARGET || 'https://ci-build-placeholder.example.com' }}
        run: npm run build

      - name: Deploy to Netlify (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: "./dist"
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "GitHub Actions deploy ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10
